server {
    listen 1021;
    server_name _;

    root /Sites/byabsayee/public;
    index index.php;

    access_log /var/log/nginx/byabsayee_access.log;
    error_log  /var/log/nginx/byabsayee_error.log;

    client_max_body_size 20M;

    # Block dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Block sensitive app folders
    location ~* ^/(app|config|views) {
        deny all;
        return 403;
    }

    # Block sensitive upload subfolders (proofs, invoices)
    location ~* ^/uploads/(proofs|invoices) {
        deny all;
        return 403;
    }

    # -----------------------------------------------------------------------
    # Uploaded files (book logos, avatars, etc.)
    # ^~ means: if this prefix matches, skip ALL regex location checks.
    # Without ^~, the ~* static-files rule below steals .png/.jpg requests
    # and looks for them in public/ instead of the uploads volume.
    # -----------------------------------------------------------------------
    location ^~ /uploads/ {
        alias /Sites/byabsayee/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static files in public/ (CSS, JS, favicon, fonts, images)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Clean URLs → index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP via php-fpm
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass byabsayee:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }
}