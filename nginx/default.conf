server {
    listen 1021;
    server_name _;    # FIX: was hardcoded to 192.168.0.123 — now accepts any hostname/IP

    # --- Document root: ONLY the /public folder is exposed to the web ---
    # Everything else (app/, config/, views/) is hidden from browsers
    root /Sites/byabsayee/public;
    index index.php;

    # --- Logging ---
    access_log /var/log/nginx/byabsayee_access.log;
    error_log  /var/log/nginx/byabsayee_error.log;

    # --- Static files served directly by nginx (fast, no PHP needed) ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- All other requests go to index.php (the front controller) ---
    # This is what makes clean URLs like /login or /dashboard work
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP files handled by your php-fpm container ---
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass byabsayee:9000;  # the custom-built container with all extensions
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Pass real visitor IP through (important for audit logs)
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }

    # --- Block direct access to sensitive folders ---
    location ~* ^/(app|config|views|uploads/proofs|uploads/invoices) {
        deny all;
        return 403;
    }

    # --- Block dotfiles (.env, .git, etc.) ---
    location ~ /\. {
        deny all;
        return 403;
    }

    # --- File upload size limit (adjust as needed) ---
    client_max_body_size 20M;
}