server {
    listen 1021;
    server_name _;

    # Document root: only the /public folder is exposed to the web
    root /Sites/byabsayee/public;
    index index.php;

    # Logging
    access_log /var/log/nginx/byabsayee_access.log;
    error_log  /var/log/nginx/byabsayee_error.log;

    # File upload size limit
    client_max_body_size 20M;

    # Block dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Block direct access to sensitive folders (NOT /uploads/ — served below)
    location ~* ^/(app|config|views|uploads/proofs|uploads/invoices) {
        deny all;
        return 403;
    }

    # Serve uploaded files (book logos, avatars, etc.) from the shared uploads volume.
    # The byabsayee_uploads volume is mounted at /Sites/byabsayee/uploads on this container.
    location /uploads/ {
        alias /Sites/byabsayee/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static files in public/ served directly by nginx.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other requests → index.php (clean URLs)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handled by php-fpm container
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass byabsayee:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }
}