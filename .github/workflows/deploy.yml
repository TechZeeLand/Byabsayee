name: Deploy Byabsayee

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'views/**'
      - 'public/**'
      - 'routes.php'
      - 'nginx/**'

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_KEY }}
          port:     ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Pulling latest code ==="
            cd /Sites/byabsayee
            git pull origin main

            echo "=== Installing dependencies ==="
            docker exec byabsayee composer install \
              --working-dir=/Sites/byabsayee \
              --no-dev \
              --optimize-autoloader \
              --no-interaction

            echo "=== Syncing public/ assets into nginx container ==="
            # The nginx image bakes public/ at build time, but git pull only
            # updates the PHP container. This copies the latest public/ files
            # (favicon, CSS, JS, etc.) directly into the running nginx container.
            docker cp /Sites/byabsayee/public/. byabsayee_nginx:/Sites/byabsayee/public/

            echo "=== Done ==="