# =============================================================================
# .github/workflows/deploy.yml
# =============================================================================
# This runs automatically every time you push to the "main" branch.
# It SSHes into your server and pulls the latest code.
#
# SETUP REQUIRED (one time):
# In your GitHub repo → Settings → Secrets and variables → Actions → New secret
# Add these secrets:
#   SERVER_HOST  →  192.168.0.123   (or your domain when you go public)
#   SERVER_USER  →  your SSH username on the server (e.g. root or debian)
#   SERVER_KEY   →  your private SSH key (contents of ~/.ssh/id_rsa)
#   SERVER_PORT  →  22  (default SSH port)
# =============================================================================

name: Deploy Byabsayee

on:
  push:
    branches:
      - main          # only deploy when pushing to main branch
    paths:
      - 'app/**'      # only deploy if app files changed (not docker/ changes)

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_KEY }}
          port:     ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Pulling latest code ==="
            cd /Sites/byabsayee
            git pull origin main

            echo "=== Installing dependencies ==="
            docker exec byabsayee composer install \
              --working-dir=/Sites/byabsayee \
              --no-dev \
              --optimize-autoloader \
              --no-interaction

            echo "=== Done ==="
