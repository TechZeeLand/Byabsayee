server {
    listen 1011;
    server_name _;

    root /Sites/byabsayee/public;
    index index.php;

    access_log /var/log/nginx/byabsayee_access.log;
    error_log  /var/log/nginx/byabsayee_error.log;

    # Static files served directly by nginx — fast, no PHP involved
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other requests go to index.php (enables clean URLs like /login, /dashboard)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP is handled by the byabsayee container's OWN php-fpm — not the shared one
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass byabsayee:9000;      # <-- byabsayee container, port 9000
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }

    # Block direct access to sensitive folders
    location ~* ^/(app|config|views|composer\.|schema\.sql) {
        deny all;
        return 403;
    }

    # Block dotfiles (.env, .git etc)
    location ~ /\. {
        deny all;
        return 403;
    }

    client_max_body_size 20M;
}
