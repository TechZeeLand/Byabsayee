version: "3.9"

services:
  byabsayee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: byabsayee
    volumes:
      - ./:/Sites/byabsayee
    environment:
      - APP_NAME=Byabsayee
      - APP_URL=http://localhost:1021
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=byabsayee_db
      - DB_USER=zizi
      - DB_PASS=RAYilyvm2005@
      - UPLOAD_PATH=/Sites/byabsayee/uploads
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your@email.com
      - SMTP_PASS=your_app_password
      - SMTP_FROM_NAME=Byabsayee
      - SESSION_NAME=byabsayee_session
      - APP_KEY=7bafd7f700b5cf9bbe90fe71f410223e9af6762e95ffc446152a84bd1ff73058
    depends_on:
      - db
    networks:
      - byabsayee
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: byabsayee_nginx
    ports:
      - "1021:80"
    volumes:
      - ./:/Sites/byabsayee:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - byabsayee
    networks:
      - byabsayee
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: byabsayee_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=RAYilyvm2005@
      - MYSQL_DATABASE=byabsayee_db
      - MYSQL_USER=zizi
      - MYSQL_PASSWORD=RAYilyvm2005@
    volumes:
      - ./mariadb/data:/var/lib/mysql
    networks:
      - byabsayee
    healthcheck:
      test: ["CMD", "mariadb", "-u", "root", "-pRAYilyvm2005@", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: byabsayee_phpmyadmin
    restart: always
    ports:
      - "8093:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=RAYilyvm2005@
    depends_on:
      - db
    networks:
      - byabsayee

networks:
  byabsayee:
    driver: bridge