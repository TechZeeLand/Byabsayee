version: "3.9"

services:
  byabsayee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: byabsayee
    volumes:
      - byabsayee_sessions:/Sites/byabsayee/storage/sessions
      - /Sites/byabsayee/uploads:/Sites/byabsayee/uploads
    environment:
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
      - APP_ENV=${APP_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - APP_KEY=${APP_KEY}
      - SESSION_NAME=${SESSION_NAME}
      - TZ=Etc/UTC
    depends_on:
      db:
        condition: service_healthy
    networks:
      - byabsayee
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: byabsayee_nginx
    ports:
      - "1021:1021"
    volumes:
      - /Sites/byabsayee/uploads:/Sites/byabsayee/uploads
    depends_on:
      - byabsayee
    networks:
      - byabsayee
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: byabsayee_db
    ports:
      - "3011:3306"
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - byabsayee_db_data:/var/lib/mysql
    networks:
      - byabsayee
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: byabsayee_phpmyadmin
    restart: always
    ports:
      - "8093:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - byabsayee

backup:
    image: alpine:latest
    container_name: byabsayee_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - byabsayee
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - TZ=Asia/Dhaka
    volumes:
      - /Sites/byabsayee/backups:/backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache mariadb-client tzdata


        cat << 'EOF' > /usr/local/bin/run-backup.sh

        if mysqladmin ping -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" --silent; then
            mariadb-dump -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" | gzip > /backup/"$DB_NAME"-$(date +%Y-%m-%d_%H-%M).sql.gz
            # Clean files older than 30 days
            find /backup -type f -name "$DB_NAME-*.sql.gz" -mtime +30 -delete
            echo "Backup successful: $(date)"
        else
            echo "ERROR: Cannot connect to MariaDB database. Backup aborted." >&2
        fi
        EOF

        chmod +x /usr/local/bin/run-backup.sh

        echo "Running initial test backup..."
        /usr/local/bin/run-backup.sh

        echo "0 2 * * * /usr/local/bin/run-backup.sh" > /etc/crontabs/root

        exec crond -f -l 2

networks:
  byabsayee:
    driver: bridge

volumes:
  byabsayee_db_data:
  byabsayee_sessions: