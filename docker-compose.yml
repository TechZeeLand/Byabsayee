version: "3.9"

services:
  byabsayee:
    build:
      context: /Sites/byabsayee
      dockerfile: Dockerfile
    container_name: byabsayee
    volumes:
      - /Sites/byabsayee:/Sites/byabsayee   # absolute path — files are here on this host
    environment:
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
      - APP_ENV=${APP_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - APP_KEY=${APP_KEY}
      - SESSION_NAME=${SESSION_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - byabsayee
    restart: unless-stopped

  nginx:
    build:
      context: /Sites/byabsayee
      dockerfile: Dockerfile.nginx   # bakes public/ + config into image, no volume needed
    container_name: byabsayee_nginx
    ports:
      - "1021:1021"
    depends_on:
      - byabsayee
    networks:
      - byabsayee
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: byabsayee_db
    ports:
      - "3011:3306"
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - byabsayee_db_data:/var/lib/mysql
    networks:
      - byabsayee
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: byabsayee_phpmyadmin
    restart: always
    ports:
      - "8093:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - byabsayee

networks:
  byabsayee:
    driver: bridge

volumes:
  byabsayee_db_data: