version: "3.9"

services:
  byabsayee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: byabsayee
    volumes:
      - ./:/Sites/byabsayee
    environment:
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
      - APP_ENV=${APP_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - APP_KEY=${APP_KEY}
    depends_on:
      - db
    networks:
      - byabsayee
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: byabsayee_nginx
    ports:
      - "1021:80"
    volumes:
      - ./:/Sites/byabsayee:ro
      - ./nginx:/etc/nginx/conf.d:ro
      # - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - byabsayee
      - php-fpm
    networks:
      - byabsayee
    restart: unless-stopped

  php-fpm:
    image: php:8.2-fpm-alpine
    container_name: byabsayee_php
    volumes:
      - ./:/Sites/byabsayee
    networks:
      - byabsayee
    restart: unless-stopped  

  db:
    image: mariadb:10.11
    container_name: byabsayee_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - ./mariadb/data:/var/lib/mysql
    networks:
      - byabsayee
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: byabsayee_phpmyadmin
    restart: always
    ports:
      - "8093:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - byabsayee

networks:
  byabsayee:
    driver: bridge